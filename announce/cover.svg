<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1e"/>
      <stop offset="1" stop-color="#1a1330"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff6b6b"/>
      <stop offset="1" stop-color="#ffa94d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#2a3050" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="470" x2="1200" y2="470"/>
  </g>

  <!-- Top-left wordmark -->
  <g transform="translate(60, 60)">
    <rect width="14" height="14" fill="url(#accent)" rx="2"/>
    <text x="24" y="13" fill="#e9ecf5" font-size="16" font-weight="600">agents-md</text>
    <text x="120" y="13" fill="#7a839f" font-size="13" font-family="monospace">v0.2.0</text>
  </g>

  <!-- Top-right meta -->
  <text x="1140" y="73" text-anchor="end" fill="#7a839f" font-size="13" font-family="monospace">MIT · EN / 中文</text>

  <!-- Main headline -->
  <g transform="translate(60, 220)">
    <text fill="#ffffff" font-size="52" font-weight="700">
      I let AI agents drive my repo
    </text>
    <text y="64" fill="#ffffff" font-size="52" font-weight="700">
      for <tspan fill="url(#accent)">three months</tspan>.
    </text>
    <text y="118" fill="#a8b0c8" font-size="22" font-weight="400">
      Here are the numbers — and the spec I wrote to fix them.
    </text>
  </g>

  <!-- Stats row -->
  <g transform="translate(60, 410)" font-family="monospace">
    <!-- Stat 1: commits/day -->
    <g>
      <text fill="#7a839f" font-size="13">commits / day</text>
      <text y="34" fill="#ff8585" font-size="34" font-weight="600">80</text>
      <text x="68" y="34" fill="#7a839f" font-size="20">→</text>
      <text x="102" y="34" fill="#7dd3a8" font-size="34" font-weight="600">14</text>
    </g>

    <!-- Stat 2: CI minutes -->
    <g transform="translate(280, 0)">
      <text fill="#7a839f" font-size="13">CI minutes / month</text>
      <text y="34" fill="#ff8585" font-size="34" font-weight="600">8,400</text>
      <text x="120" y="34" fill="#7a839f" font-size="20">→</text>
      <text x="154" y="34" fill="#7dd3a8" font-size="34" font-weight="600">2,300</text>
    </g>

    <!-- Stat 3: migration incidents -->
    <g transform="translate(620, 0)">
      <text fill="#7a839f" font-size="13">prod migration incidents</text>
      <text y="34" fill="#ff8585" font-size="34" font-weight="600">4</text>
      <text x="50" y="34" fill="#7a839f" font-size="20">→</text>
      <text x="84" y="34" fill="#7dd3a8" font-size="34" font-weight="600">0</text>
    </g>
  </g>

  <!-- Bottom URL -->
  <g transform="translate(60, 560)">
    <text fill="#7a839f" font-size="14" font-family="monospace">
      github.com/maweis1981/agents-md
    </text>
    <text x="1080" y="0" text-anchor="end" fill="#7a839f" font-size="14" font-family="monospace">
      bilingual · skills · templates · lint
    </text>
  </g>
</svg>
